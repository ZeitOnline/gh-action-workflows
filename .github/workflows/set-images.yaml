name: Set image tags
on:
  workflow_call:
    inputs:
      location:
        required: true
        type: string
      images:
        required: true
        type: string
jobs:
  set-images:
    name: Set image versions
    runs-on: zon-ubuntu-general-dind
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@01dd5d3ca463c7f10f7f4f7b4f177225ac661ee4 # v6
        with:
          gpg_private_key: ${{ secrets.ZON_OPS_GPG_KEY_PRIVATE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2
      - name: Set image tags
        run: |
          cd ${{ inputs.location }}
          kustomize edit set image ${{ inputs.images }}
      - name: Commit and push image tags
        run: |
          git commit -am "Update image versions (``${{ inputs.versions }}``)"
          git push
