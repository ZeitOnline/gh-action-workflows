name: Test & push
on:
  workflow_call:
    inputs:
      service:
        required: false
        type: string
        default: backend
      project:
        required: false
        type: string
      targets:
        required: false
        type: string
      versions:
        required: false
        type: string
      compose_file:
        required: false
        type: string
        default: testing.yaml
      run_args:
        required: false
        type: string
      test_args:
        required: false
        type: string
        default: -- --verbose --junitxml=/testing/junit.xml
      artifacts:
        required: false
        type: string
      build_args:
        required: false
        type: string
        default: .
env:
  COMPOSE_FILE: ${{ inputs.compose_file }}
jobs:
  test-and-push:
    name: Test and push docker images
    runs-on: zon-ubuntu-general-dind
    permissions:
      id-token: write
      contents: write
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          submodules: true
      # build images, run tests and handle artifacts
      - name: Run tests
        run: |
          docker compose run --build --rm ${{ inputs.run_args }} ${{ inputs.service }} ${{ inputs.test_args }}
      - name: Publish test result
        uses: enricomi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2
        if: always()
        with:
          junit_files: testing/junit.xml
          comment_mode: "off"
      - name: Extract build artifacts
        if: inputs.artifacts
        run: |
          docker compose run --rm --entrypoint "tar cvv ${{ inputs.artifacts }}/" ${{ inputs.service }} | tar x
      - name: Store build artifacts
        if: inputs.artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts
          path: ${{ inputs.artifacts }}*
      # set up variables and auth
      - name: Set variables
        id: vars
        run: |
          input="${{ inputs.project }}"
          repository="${{ github.repository }}"
          default="${repository##*/}"
          project="${input:-$default}"
          echo "project=$project" >> "$GITHUB_ENV"
          echo "prefix=${{ vars.GAR_DOCKER_REGISTRY }}/$project" >> "$GITHUB_ENV"
          echo "describe=$( git describe --tags )" >> "$GITHUB_ENV"
      - name: Setup auth
        id: baseproject
        uses: ZeitOnline/gh-action-baseproject@v0
        if: inputs.targets
        with:
          project_name: ${{ env.project }}
          environment: production     # needs 'production' service account
          gar_docker_auth: true
          vault_export_token: true
      # prepare sysdig scans
      - name: Retrieve Sysdig secure token
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
        if: inputs.targets
        with:
          method: jwt
          url: ${{ steps.baseproject.outputs.vault_addr }}
          path: ${{ steps.baseproject.outputs.gha_vault_path }}
          role: ${{ steps.baseproject.outputs.gha_vault_role }}
          secrets: |
            zon/v1/sysdig/sysdig-scanner api-key | SECURE_API_TOKEN;
      - name: Setup Sysdig CLI scanner
        if: inputs.targets
        run: |
          base="https://download.sysdig.com/scanning"
          version=$( curl -L -s "$base/sysdig-cli-scanner/latest_version.txt" )
          curl -LO "$base/bin/sysdig-cli-scanner/$version/linux/amd64/sysdig-cli-scanner"
          curl -LO "$base/bin/sysdig-cli-scanner/$version/linux/amd64/sysdig-cli-scanner.sha256"
          sha256sum -c sysdig-cli-scanner.sha256
          chmod +x sysdig-cli-scanner
      # build & publish images
      - name: Publish images
        if: inputs.targets
        run: |
          for target in ${{ inputs.targets }}; do
            tag="${{ env.prefix }}-$target:${{ env.describe }}"
            docker build --target $target --tag $tag ${{ inputs.build_args }}
            ./sysdig-cli-scanner --apiurl https://eu1.app.sysdig.com/secure --output=json-file=scan-result.json $tag
            docker push $tag
          done
      # update image versions for 'staging'
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        if: ${{ inputs.versions }}
        with:
          gpg_private_key: ${{ secrets.ZON_OPS_GPG_KEY_PRIVATE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@53f941b41dca13ed61874bbc6b4b6e1562877530 # v3
        if: ${{ inputs.versions }}
      - name: Pull recent changes
        if: ${{ inputs.versions }}
        run: |
          git pull
      - name: Set image tags
        if: ${{ inputs.versions }}
        run: |
          cd ${{ inputs.versions }}
          for target in ${{ inputs.targets }}; do
            kustomize edit set image $target:${{ env.describe }}
          done
      - name: Commit and push image tags
        if: ${{ inputs.versions }}
        run: |
          git commit -am "ci: update image versions (``${{ inputs.versions }}``)"
          git push
